<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RoboScene+ 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    canvas {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
      outline: none;
    }

    #legend {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(10, 10, 26, 0.82);
      border: 1px solid rgba(127, 119, 221, 0.4);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
      z-index: 100;
      min-width: 130px;
    }
    #legend h3 {
      color: #7F77DD;
      font-size: 11px;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(10, 10, 26, 0.82);
      border: 1px solid rgba(127, 119, 221, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: #9090b0;
      pointer-events: none;
      z-index: 100;
      text-align: right;
    }

    #loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 26, 0.95);
      border: 1px solid rgba(127, 119, 221, 0.5);
      border-radius: 10px;
      padding: 28px 40px;
      font-size: 14px;
      color: #7F77DD;
      z-index: 200;
      text-align: center;
      min-width: 300px;
    }
    #progress-wrap {
      width: 100%;
      height: 5px;
      background: #1e1e3a;
      border-radius: 3px;
      margin: 14px 0 8px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: #7F77DD;
      border-radius: 3px;
      transition: width 0.3s linear;
    }
    #progress-text { font-size: 11px; color: #888; }
    #loading-sub   { font-size: 11px; color: #555; margin-top: 8px; }
    #loading-hint  { font-size: 10px; color: #444; margin-top: 10px; }

    #error {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(60, 10, 10, 0.95);
      border: 1px solid #c44;
      border-radius: 10px;
      padding: 20px 28px;
      font-size: 13px;
      color: #ff8888;
      z-index: 200;
      max-width: 520px;
      word-break: break-word;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="loading">
    ⬡ RoboScene+ 3D Viewer
    <div id="progress-wrap"><div id="progress-fill"></div></div>
    <div id="progress-text">Initialising…</div>
    <div id="loading-sub">Loading scene — please wait</div>
    <div id="loading-hint">Large scenes can take 15–30 s to sort on GPU</div>
  </div>

  <div id="error"></div>

  <div id="legend">
    <h3>Semantic labels</h3>
    <div class="legend-row"><div class="swatch" style="background:#FFB6C1"></div>bed</div>
    <div class="legend-row"><div class="swatch" style="background:#20B2AA"></div>desk</div>
    <div class="legend-row"><div class="swatch" style="background:#4682B4"></div>chair</div>
    <div class="legend-row"><div class="swatch" style="background:#6495ED"></div>laptop</div>
    <div class="legend-row"><div class="swatch" style="background:#2F6F6F"></div>monitor</div>
    <div class="legend-row"><div class="swatch" style="background:#FF6347"></div>fan</div>
    <div class="legend-row"><div class="swatch" style="background:#FFD700"></div>lamp</div>
    <div class="legend-row"><div class="swatch" style="background:#CD853F"></div>shelf</div>
    <div class="legend-row"><div class="swatch" style="background:#DEB887"></div>door</div>
    <div class="legend-row"><div class="swatch" style="background:#87CEEB"></div>window</div>
  </div>

  <div id="controls">
    WASD · drag to look · scroll to zoom<br>
    Q/E to roll · R/F to rise/fall
  </div>

  <script type="module">
    import * as GaussianSplats3D from
      'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.6/build/gaussian-splats-3d.module.min.js';

    const fillEl = document.getElementById('progress-fill');
    const textEl = document.getElementById('progress-text');
    const subEl  = document.getElementById('loading-sub');
    const loadEl = document.getElementById('loading');
    const errEl  = document.getElementById('error');

    // ── Resolve scene URL from hash or query param ────────────────────────
    let plyUrl = '';
    const hashMatch = window.location.hash.match(/^#ply=(.+)$/);
    if (hashMatch) {
      plyUrl = decodeURIComponent(hashMatch[1]);
    } else {
      const p = new URLSearchParams(window.location.search);
      plyUrl = p.get('ply') || '';
    }

    if (!plyUrl) {
      loadEl.style.display = 'none';
      errEl.style.display  = 'block';
      errEl.innerHTML = '<b>No scene URL provided.</b><br>Add <code>#ply=&lt;url&gt;</code> to the page URL.';
    } else {
      loadScene(plyUrl);
    }

    // ── Auto-prefer .splat if it exists alongside the .ply ────────────────
    async function resolveUrl(url) {
      // First try _pruned.splat (smaller, fewer floaters)
      const prunedUrl = url.replace(/\.ply(\?.*)?$/i, '_pruned.splat');
      const splatUrl  = url.replace(/\.ply(\?.*)?$/i, '.splat');
      if (prunedUrl !== url) {
        try {
          const r = await fetch(prunedUrl, { method: 'HEAD' });
          if (r.ok) { subEl.textContent = 'Using pruned .splat (fast, clean)'; return prunedUrl; }
        } catch (_) {}
      }
      if (splatUrl !== url) {
        try {
          const r = await fetch(splatUrl, { method: 'HEAD' });
          if (r.ok) { subEl.textContent = 'Using .splat format (7× faster)'; return splatUrl; }
        } catch (_) {}
      }
      return url;
    }

    // ── Animated progress bar for the sort phase ──────────────────────────
    // We run a fake bar from 0→90% over the expected download time, then
    // hold at 90% during the sort step. Looks better than a static bar.
    function startFakeProgress(totalSec) {
      let pct = 0;
      const step = 90 / (totalSec * 10);   // reach 90% in totalSec seconds
      const id = setInterval(() => {
        pct = Math.min(90, pct + step);
        fillEl.style.width = pct + '%';
      }, 100);
      return id;
    }

    // ── Main load function ────────────────────────────────────────────────
    async function loadScene(plyUrl) {
      textEl.textContent = 'Checking for optimised format…';
      const url = await resolveUrl(plyUrl);
      const ext = url.split('?')[0].split('.').pop().toLowerCase();
      const isPruned = url.includes('_pruned');

      subEl.textContent  = isPruned
        ? 'Loading pruned scene (1.3 M splats)…'
        : `Loading ${ext.toUpperCase()} scene (4.3 M splats)…`;

      // Estimate download time: pruned ≈ 5s, full splat ≈ 15s, ply ≈ 60s
      const estSec = isPruned ? 8 : (ext === 'splat' ? 20 : 60);
      const fakeId = startFakeProgress(estSec);

      // Elapsed counter so the user knows something is happening
      let elapsed = 0;
      const ticker = setInterval(() => {
        elapsed++;
        const splats = isPruned ? '1.3 M' : '4.3 M';
        if (elapsed < estSec) {
          textEl.textContent = `Downloading… (${elapsed}s)`;
        } else {
          fillEl.style.width = '90%';
          textEl.textContent = `Sorting ${splats} splats… (${elapsed}s)`;
        }
      }, 1000);

      const viewer = new GaussianSplats3D.Viewer({
        cameraUp:              [0, -1, 0],
        initialCameraPosition: [-0.1, 0, 1.5],
        initialCameraLookAt:   [0, 0, 0],
        selfDrivenMode:        true,
        useBuiltInControls:    true,
        dynamicScene:          false,
        webXRMode:             GaussianSplats3D.WebXRMode.None,
        renderMode:            GaussianSplats3D.RenderMode.Always,
      });

      try {
        await viewer.addSplatScene(url, {
          splatAlphaRemovalThreshold: 5,
          showLoadingUI: false,
        });
        clearInterval(ticker);
        clearInterval(fakeId);
        fillEl.style.width  = '100%';
        textEl.textContent  = 'Ready!';
        setTimeout(() => { loadEl.style.display = 'none'; }, 300);
        viewer.start();
      } catch (err) {
        clearInterval(ticker);
        clearInterval(fakeId);
        loadEl.style.display = 'none';
        errEl.style.display  = 'block';
        errEl.innerHTML =
          `<b>Failed to load scene</b><br><br>` +
          `${err.message || err}<br><br>` +
          `<small>URL tried: <code>${url}</code></small>`;
      }
    }
  </script>
</body>
</html>
